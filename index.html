<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <title>今日外包出貨確認</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <p class="eyebrow">出貨拍照回報</p>
        <h1>今日外包出貨確認</h1>
      </header>

      <section class="section" aria-labelledby="vendors-title">
        <div class="section-header">
          <h2 id="vendors-title">外包商箱數</h2>
        </div>

        <div class="form-grid">
          <label class="field">
            <span>廠商</span>
            <select id="vendorSelect">
              <option value="亞克">亞克</option>
              <option value="鎧鉅">鎧鉅</option>
              <option value="馗鼎">馗鼎</option>
              <option value="大寶鈦金">大寶鈦金</option>
              <option value="亞洲科匯">亞洲科匯</option>
              <option value="聖釭">聖釭</option>
            </select>
          </label>

          <label class="field">
            <span>箱數</span>
            <select id="boxCountSelect">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </label>

          <button id="addVendorButton" class="button button-primary" type="button">
            加入
          </button>
        </div>

        <div class="list-panel" aria-live="polite">
          <div class="list-panel-header">
            <h3>目前清單</h3>
            <button id="clearVendorButton" class="button button-ghost" type="button">
              清除清單
            </button>
          </div>
          <ul id="vendorList" class="vendor-list"></ul>
          <p id="emptyVendorText" class="empty-text">尚未加入外包商箱數</p>
        </div>
      </section>

      <section class="section" aria-labelledby="staff-title">
        <div class="section-header">
          <h2 id="staff-title">出貨人員</h2>
        </div>

        <label class="field">
          <span>人員</span>
          <select id="staffSelect">
            <option value="">請選擇出貨人員</option>
            <option value="蕭伊呈">蕭伊呈</option>
            <option value="甘家瑋">甘家瑋</option>
            <option value="洪凱筠">洪凱筠</option>
          </select>
        </label>
      </section>

      <section class="section copy-section" aria-labelledby="copy-title">
        <div class="section-header">
          <h2 id="copy-title">LINE 回報文字</h2>
        </div>
        <button id="copyInfoButton" class="button button-copy" type="button">
          複製資訊
        </button>
        <p id="copyStatus" class="status-text" role="status" aria-live="polite"></p>
        <textarea
          id="reportOutput"
          class="report-output"
          aria-label="LINE 回報文字"
          readonly
          hidden
        ></textarea>
      </section>

      <section class="section" aria-labelledby="photos-title">
        <div class="section-header">
          <h2 id="photos-title">拍照</h2>
        </div>

        <div class="shot-buttons" aria-label="拍照項目">
          <button class="button button-camera" type="button" data-camera-step="P1">P1</button>
          <button class="button button-camera" type="button" data-camera-step="P2">P2</button>
          <button class="button button-camera" type="button" data-camera-step="P3">P3</button>
        </div>

        <div id="cameraPanel" class="camera-panel" hidden>
          <div class="camera-panel-header">
            <span id="cameraStepBadge" class="step-badge">P1</span>
            <button id="closeCameraButton" class="button button-ghost" type="button">
              取消
            </button>
          </div>
          <div class="camera-view">
            <video id="cameraVideo" autoplay muted playsinline></video>
          </div>
          <div class="camera-actions">
            <button id="captureCameraButton" class="button button-copy" type="button">
              拍照
            </button>
          </div>
          <p id="cameraStatus" class="status-text" role="status" aria-live="polite"></p>
        </div>

        <div id="photoPreview" class="preview-frame">
          <span>尚未拍照</span>
        </div>
        <a id="downloadPhoto" class="button button-download" href="#" download hidden>
          儲存圖片
        </a>
        <button id="clearPhotoButton" class="button button-ghost button-clear-photo" type="button" hidden>
          已存檔，清除照片
        </button>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
